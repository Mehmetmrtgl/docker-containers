version: '3.8'

services:
  ros2_dev:
    build:
      context: .
      args:
        USER_UID: 1000
        USER_GID: 1000
    container_name: ros2_humble_container
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      - /media/mehmet/Elements/datas:/home/ros/ros2_ws/datas
    stdin_open: true
    tty: true
